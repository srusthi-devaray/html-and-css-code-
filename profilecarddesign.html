<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile-card-ui-design</title>
    <link rel="stylesheet" href=" https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="srusthiphoto.jpeg" alt="" class="profile-img">
        </div>

   
    <div class="text-data">
        <span class="name">srusthi</span>
        <span class="job">student & singer</span>
    </div>

    <div class="media-button">
         <a href="#" style="background-color: cadetblue" class="link">
            <i class="fa-brands fa-facebook"></i>
         </a>

         <a href="#" style="background-color:darkturquoise;" class="link">
            <i class="fa-brands fa-twitter"></i>
         </a>

         <a href="#"  style="background-color:palevioletred" class="link">
           <i class="fa-brands fa-instagram"></i>
         </a>

         <a href="#" style="background-color:crimson" class="link">
           <i class="fa-brands fa-square-youtube"></i>
         </a>

        

         
    </div>
     <div class="buttons">
            <button class="button" >subscribe</button>
            <button class="button">message</button>
         </div>
    
         <div class="analytics">
            <div class="data">
               <i class="fa-regular fa-heart"></i>

                <span class="number">60k</span>
            </div>

             <div class="data">
               
                 <i class="fa-regular fa-comment"></i>
                <span class="number">12k</span>
            </div>

             <div class="data">
               <i class="fa-solid fa-share"></i>

                <span class="number">20k</span>
            </div>

         </div>

    </div>
    
</body>
</html>
